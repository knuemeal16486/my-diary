name: GitHub Pages 배포

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: API 키 주입 (GitHub Secret → app.js)
        run: sed -i "s|__GEMINI_API_KEY__|${{ secrets.GEMINI_API_KEY }}|g" app.js

      - name: 캐시 무력화 (커밋 SHA → script 쿼리 파라미터)
        run: sed -i "s|app\.js?v=[^\"]*|app.js?v=${{ github.sha }}|g; s|src=\"app\.js\"|src=\"app.js?v=${{ github.sha }}\"|g" index.html

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v4

      - name: 배포 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
